<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>科学 F1 打卡挑战 - 非凡教育 廖老师</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .mission-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .mission-card.completed { background-color: #f0fdf4; border-color: #22c55e; color: #166534; }
        .mission-card.locked { opacity: 0.5; cursor: not-allowed; filter: grayscale(1); }
        .modal-enter { animation: slideUp 0.3s ease-out; }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        #three-container canvas { border-radius: 2.5rem; cursor: grab; }
        .point-item { border-left: 4px solid #3b82f6; padding-left: 12px; margin-bottom: 12px; font-size: 0.85rem; line-height: 1.5; background: white; padding: 10px; border-radius: 0 8px 8px 0; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
        .progress-glow { box-shadow: 0 0 15px rgba(59, 130, 246, 0.5); }
        .logo-box { width: 100px; height: 100px; }
    </style>
</head>
<body class="min-h-screen">

    <!-- 登录界面 -->
    <div id="loginModal" class="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/95 px-4 text-center">
        <div class="bg-white rounded-[3.5rem] shadow-2xl p-10 w-full max-w-md border border-white/20 relative">
            <!-- 非凡教育 Logo -->
            <div class="mx-auto mb-6 logo-box rounded-full bg-white shadow-xl overflow-hidden flex items-center justify-center p-1 border border-slate-100">
                <img src="./254622913_458673955588740_2874846904320760922_n.jpg" alt="非凡教育 Logo" class="w-full h-full object-contain" onerror="this.style.display='none'; document.getElementById('logoFallback').style.display='flex';">
                <div id="logoFallback" class="hidden w-full h-full items-center justify-center font-black text-blue-600">ME</div>
            </div>
            
            <h1 class="text-3xl font-black text-slate-800 mb-2 tracking-tight">科学打卡挑战</h1>
            <p class="text-slate-400 mb-8 font-medium">15天 UPSA 提分特训</p>
            
            <div id="statusNotice" class="hidden mb-4 p-3 bg-amber-50 text-amber-700 text-[10px] rounded-xl border border-amber-100 italic text-center leading-relaxed">
                <!-- 动态提示信息 -->
            </div>

            <div class="space-y-4">
                <input type="text" id="studentNameInput" placeholder="请输入学生姓名" 
                    class="w-full px-6 py-4 rounded-2xl border-2 border-slate-100 focus:border-blue-500 outline-none transition-all text-center text-xl font-bold">
                <button id="loginBtn" onclick="handleLogin()" 
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-black py-5 rounded-2xl transition-all shadow-lg active:scale-95">
                    进入实验室
                </button>
            </div>
            <div class="mt-8 pt-6 border-t border-slate-50 text-center">
                <p class="text-slate-400 text-xs font-bold tracking-widest uppercase italic">准备于 非凡教育 廖老师</p>
            </div>
        </div>
    </div>

    <!-- 主界面 -->
    <div id="appContent" class="hidden">
        <header class="bg-white/80 backdrop-blur-md border-b border-slate-100 sticky top-0 z-40 px-6 py-4">
            <div class="max-w-6xl mx-auto flex justify-between items-center">
                <div class="flex items-center space-x-4">
                    <div class="w-12 h-12 rounded-xl bg-white shadow-md overflow-hidden flex items-center justify-center border border-slate-100 p-0.5">
                        <img src="./254622913_458673955588740_2874846904320760922_n.jpg" class="w-full h-full object-contain">
                    </div>
                    <div>
                        <h2 id="displayName" class="font-black text-slate-800 text-xl">-</h2>
                        <span id="rankBadge" class="text-[10px] bg-blue-100 text-blue-600 px-2 py-0.5 rounded-full font-bold uppercase tracking-widest">Scientist</span>
                    </div>
                </div>
                
                <div class="hidden md:flex flex-col items-center flex-1 max-w-xs mx-8">
                    <div class="flex justify-between w-full mb-1">
                        <span class="text-[10px] font-bold text-slate-400 uppercase tracking-tighter">打卡进度</span>
                        <span id="progressText" class="text-[10px] font-bold text-blue-600">0/15</span>
                    </div>
                    <div class="w-full bg-slate-100 h-2 rounded-full overflow-hidden">
                        <div id="progressBar" class="bg-blue-500 h-full transition-all duration-1000" style="width: 0%"></div>
                    </div>
                </div>

                <div class="flex items-center space-x-3">
                    <button onclick="toggleShop()" class="bg-amber-400 hover:bg-amber-500 text-amber-950 px-5 py-2.5 rounded-2xl font-black transition-all shadow-sm">
                        🛒 商店
                    </button>
                    <div class="bg-white px-5 py-2.5 rounded-2xl border border-slate-100 flex items-center shadow-sm">
                        <span class="text-blue-600 font-black text-xl mr-1" id="powerCounter">0</span>
                        <span class="text-slate-400 text-[10px] font-bold tracking-tighter uppercase">Power</span>
                    </div>
                </div>
            </div>
        </header>

        <main class="max-w-6xl mx-auto px-6 py-10 grid grid-cols-1 lg:grid-cols-12 gap-10">
            <div class="lg:col-span-5">
                <div class="bg-white rounded-[3rem] p-6 shadow-xl shadow-slate-200/50 sticky top-28 border border-slate-50 text-center">
                    <div id="three-container" class="w-full aspect-square bg-slate-50 overflow-hidden relative border-4 border-white shadow-inner rounded-[3rem]"></div>
                    <div class="mt-8">
                        <h4 class="text-xs font-black text-slate-400 uppercase tracking-widest mb-4 ml-2 text-left">我的科学家装备</h4>
                        <div class="p-4 bg-slate-50 rounded-[2.5rem] min-h-[100px] flex flex-col items-center justify-center relative border border-slate-100">
                            <p id="emptyMsg" class="text-slate-300 text-xs italic text-center">完成任务即可解开全部装备</p>
                            <div id="inventoryContainer" class="flex flex-wrap gap-3 w-full"></div>
                        </div>
                    </div>
                    <div class="mt-8 opacity-40">
                        <p class="text-[10px] font-black text-slate-400 uppercase tracking-[0.2em]">准备于 非凡教育 廖老师</p>
                    </div>
                </div>
            </div>
            <div class="lg:col-span-7 space-y-12">
                <div id="missionGrid" class="space-y-12"></div>
                <footer class="py-10 text-center border-t border-slate-100 opacity-50">
                    <p class="text-xs font-bold text-slate-400">© 准备于 非凡教育 廖老师</p>
                </footer>
            </div>
        </main>
    </div>

    <!-- 问答 Modal -->
    <div id="quizModal" class="fixed inset-0 z-50 hidden flex items-center justify-center bg-slate-900/80 px-4">
        <div class="bg-white rounded-[3.5rem] shadow-2xl p-8 w-full max-w-2xl max-h-[90vh] overflow-y-auto modal-enter border border-white/20">
            <div class="flex justify-between items-center mb-6 px-2">
                <h3 id="quizTitle" class="text-2xl font-black text-slate-800 tracking-tight">打卡详情</h3>
                <button onclick="closeQuiz()" class="text-slate-300 hover:text-slate-600 text-4xl font-light">&times;</button>
            </div>
            <div id="quizContainer">
                <div id="sectionAContainer" class="mb-8 p-8 bg-blue-50/50 rounded-[2.5rem] border border-blue-100">
                    <div class="flex items-center space-x-2 mb-4">
                        <span class="text-[10px] font-black bg-blue-600 text-white px-2 py-1 rounded">SECTION A</span>
                    </div>
                    <p id="quizQuestionA" class="text-slate-700 font-bold text-lg leading-relaxed mb-6"></p>
                    <div id="quizOptionsA" class="grid grid-cols-1 gap-4"></div>
                </div>
                <div id="sectionC" class="hidden border-t border-slate-100 pt-8">
                    <div class="flex items-center space-x-2 mb-4">
                        <span class="text-[10px] font-black bg-amber-500 text-white px-2 py-1 rounded">SECTION C</span>
                    </div>
                    <p id="quizQuestionC" class="text-slate-700 font-bold mb-6 text-lg leading-snug"></p>
                    <div id="quizAnswerC" class="bg-slate-50 p-6 rounded-[2rem] border border-slate-200 mb-8"></div>
                    <button id="completeBtn" onclick="markCompleted()" class="w-full bg-green-500 hover:bg-green-600 text-white font-black py-5 rounded-2xl shadow-xl transform active:scale-95 transition-all">
                        确认领取 10 Power
                    </button>
                </div>
            </div>
            <div id="quizFeedback" class="mt-6 hidden p-5 rounded-2xl text-center font-black"></div>
        </div>
    </div>

    <!-- 商店 Modal -->
    <div id="shopModal" class="fixed inset-0 z-50 hidden flex items-center justify-center bg-slate-900/80 px-4">
        <div class="bg-white rounded-[3.5rem] shadow-2xl p-10 w-full max-w-2xl modal-enter border border-white/20">
            <div class="flex justify-between items-center mb-8">
                <h3 class="text-3xl font-black text-slate-800">实验室装备店</h3>
                <button onclick="toggleShop()" class="text-slate-300 text-4xl">&times;</button>
            </div>
            <p id="shopRewardNotice" class="text-blue-500 font-bold text-sm hidden mb-4 text-center">✨ 大师成就达成：所有装备免费解开！ ✨</p>
            <div id="shopItems" class="grid grid-cols-2 sm:grid-cols-3 gap-6 overflow-y-auto max-h-[60vh] p-2"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // --- 环境检测与 Firebase 状态 ---
        let firebaseConfig;
        let isDemoMode = false;
        let db, auth;
        const appId = 'sci-f1-v11';

        // 核心任务数据
        const missionsData = [
            {
                bab: 1,
                title: "Bab 1: Pengenalan kepada Penyiasatan Saintifik",
                tasks: [
                    { id: "d1", title: "Day 1: 实验室安全", quiz: { qA: "(Section A) Antara simbol amaran berikut, yang manakah mewakili bahan beracun? [2m]", aA: ["A. 💀", "B. 🔥", "C. ☢️", "D. 💥"], correctA: 0, qC: "(Section C) Huraikan langkah-langkah jika berlaku tumpahan merkuri (13m):", aC: ["Inform teacher immediately.", "Restricted zone.", "Sprinkle sulfur powder.", "Call Fire Dept.", "Mercury is toxic heavy metal.", "Vapor attacks nerve system.", "Sulfur prevents evaporation."] } },
                    { id: "d2", title: "Day 2: 密度应用", quiz: { qA: null, aA: [], correctA: null, qC: "(Section C) Mengapa telur tenggelam dalam air mineral tetapi terapung dalam air garam? [15m]", aC: ["Density egg > mineral water.", "Salt increases water density.", "Salt water denser than egg.", "Egg less dense than salt water.", "Buoyant force increases.", "Supports egg weight.", "Egg floats."] } },
                    { id: "d3", title: "Day 3: 物理量与读数", quiz: { qA: "(Section A) Apakah unit S.I. bagi arus elektrik? [2m]", aA: ["A. Volt", "B. Ohm", "C. Ampere", "D. Watt"], correctA: 2, qC: "(Section C) Cara elak ralat paralaks pada pembaris (13m):", aC: ["Parallax error: wrong eye position.", "Eye perpendicular to scale.", "Directly above mark.", "Accurate reading."] } },
                    { id: "d4", title: "Day 4: 细胞呼吸", quiz: { qA: null, aA: [], correctA: null, qC: "(Section C) Persamaan respirasi sel & kepentingannya [15m]:", aC: ["Glukosa + Oksigen -> CO2 + Air + Tenaga.", "Mitochondria.", "Releases energy.", "Enable movement.", "New cell growth."] } },
                    { id: "d5", title: "Day 5: 组织层次 (1)", quiz: { qA: "(Section A) Urutan organisasi sel yang betul?", aA: ["A. Sel-Organ-Tisu", "B. Sel-Tisu-Organ", "C. Tisu-Sel-Organ"], correctA: 1, qC: "(Section C) Fungsi jantung (12m):", aC: ["Cardiac muscle tissue.", "Contracts and relaxes.", "Pumps blood.", "Delivers O2 & nutrients.", "Removes CO2."] } }
                ]
            },
            {
                bab: 2,
                title: "Bab 2: Sel sebagai Unit Asas Kehidupan",
                tasks: [
                    { id: "d6", title: "Day 6: 细胞结构与功能", quiz: { qA: "(Section A) Fungsi kloroplas?", aA: ["A. Kawal aktiviti", "B. Tenaga", "C. Fotosintesis", "D. Sokongan"], correctA: 2, qC: "(Section C) Struktur tumbuhan unik (13m):", aC: ["Dinding sel: Bentuk & sokongan.", "Kloroplas: Fotosintesis.", "Vakuol: Kesegahan."] } },
                    { id: "d7", title: "Day 7: 单细胞与多细胞", quiz: { qA: null, aA: [], correctA: null, qC: "(Section C) Unisel vs Multisel (15m):", aC: ["Unisel: Amoeba.", "Multisel: Spirogyra.", "Uni=1 cell.", "Uni=all processes in 1 cell."] } },
                    { id: "d8", title: "Day 8: 组织层次 (2)", quiz: { qA: "(Section A) Urutan organisasi yang betul?", aA: ["A. Sel-Organ-Tisu", "B. Sel-Tisu-Organ"], correctA: 1, qC: "(Section C) Complex Organism (13m):", aC: ["Cell -> Tissue -> Organ -> System -> Organism."] } },
                    { id: "d9", title: "Day 9: 光合作用", quiz: { qA: null, aA: [], correctA: null, qC: "(Section C) Persamaan fotosintesis (15m):", aC: ["CO2 + Air -> Glukosa + Oksigen.", "Glucose: Energy or starch.", "Stored in leaves/roots."] } },
                    { id: "d15", title: "Day 15: 综合模拟", quiz: { qA: null, aA: [], correctA: null, qC: "(Section C) Eksperimen klorofil (15m):", aC: ["Hypothesis: Green part makes starch.", "Iodine test.", "Boil in ethanol.", "Green turns blue-black."] } }
                ]
            },
            {
                bab: 3,
                title: "Bab 3: Koordinasi and Gerak Balas",
                tasks: [
                    { id: "d10", title: "Day 10: 稳态平衡", quiz: { qA: "(Section A) Maksud homeostasis?", aA: ["A. Sel baru", "B. Kawal persekitaran dalaman"], correctA: 1, qC: "(Section C) Kepentingan (13m):", aC: ["Stable environment.", "Metabolism efficiency.", "Prevent death."] } },
                    { id: "d11", title: "Day 11: 体温调节-热", quiz: { qA: null, aA: [], correctA: null, qC: "(Section C) Reaction to heat (15m):", aC: ["Sweat gland: Sweat.", "Blood vessel: Dilate.", "Hairs: Slanted."] } },
                    { id: "d12", title: "Day 12: 体温调节-冷", quiz: { qA: "(Section A) Mengapa menggigil?", aA: ["A. Bebas haba", "B. Hasilkan haba"], correctA: 1, qC: "(Section C) Cold mechanism (13m):", aC: ["Muscle shivering.", "Heat generation.", "Increase metabolism."] } },
                    { id: "d13", title: "Day 13: 水分调节", quiz: { qA: null, aA: [], correctA: null, qC: "(Section C) Less water mechanism (15m):", aC: ["Hypothalamus detects.", "Kidney reabsorbs.", "Concentrated urine."] } },
                    { id: "d14", title: "Day 14: 植物稳态", quiz: { qA: "(Section A) Transpirasi di mana?", aA: ["A. Akar", "B. Stoma"], correctA: 1, qC: "(Section C) Importance (13m):", aC: ["Cooling effect.", "Transpiration pull.", "Transport minerals."] } }
                ]
            }
        ];

        const shopData = [
            { id: 'item_labcoat', name: '3D 实验袍', price: 30, icon: '🥼', layer: 'labcoat' },
            { id: 'item_goggles', name: '科研护目镜', price: 20, icon: '🽽', layer: 'goggles' },
            { id: 'item_microscope', name: '显微镜', price: 50, icon: '🔬', layer: 'tool' },
            { id: 'item_flask', name: '量瓶', price: 40, icon: '🧪', layer: 'tool' },
            { id: 'item_telescope', name: '望远镜', price: 80, icon: '🔭', layer: 'tool' },
            { id: 'item_dna', name: 'DNA 模型', price: 60, icon: '🧬', layer: 'tool' }
        ];

        const allTasksFlat = missionsData.flatMap(b => b.tasks);
        let state = { studentName: "", power: 0, completedTasks: [], inventory: [], equipped: { labcoat: false, goggles: false, tool: null }, user: null, currentTaskId: null, sectionApassed: false };

        // --- 初始化应用 ---
        const setupApp = async () => {
            const notice = document.getElementById('statusNotice');
            try {
                if (typeof __firebase_config !== 'undefined') {
                    firebaseConfig = JSON.parse(__firebase_config);
                } else {
                    firebaseConfig = {
                        apiKey: "在此填入你的API_KEY",
                        authDomain: "PROJECT.firebaseapp.com",
                        projectId: "PROJECT",
                        storageBucket: "PROJECT.appspot.com",
                        messagingSenderId: "SENDER",
                        appId: "APP"
                    };
                    
                    if (firebaseConfig.apiKey.includes("在此填入")) {
                        isDemoMode = true;
                        notice.innerText = "⚠️ 检测到未配置 Firebase，已进入离线演示模式 (进度将无法保存)。";
                        notice.classList.remove('hidden');
                    }
                }

                if (!isDemoMode) {
                    const app = initializeApp(firebaseConfig);
                    auth = getAuth(app);
                    db = getFirestore(app);
                    onAuthStateChanged(auth, u => { if(u) state.user = u; });
                }
            } catch (e) {
                console.error("Firebase 载入失败", e);
                isDemoMode = true;
                notice.innerText = "⚠️ 连接云端失败，已进入离线模式。";
                notice.classList.remove('hidden');
            }
        };

        // --- Three.js 角色 ---
        let scene, camera, renderer, scientistGroup, items3D = {};
        function initThree() {
            const container = document.getElementById('three-container');
            if (!container) return;
            scene = new THREE.Scene(); scene.background = new THREE.Color(0xf1f5f9);
            camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 1000); camera.position.set(0, 1.5, 5);
            renderer = new THREE.WebGLRenderer({ antialias: true }); renderer.setSize(container.clientWidth, container.clientHeight);
            renderer.shadowMap.enabled = true; container.innerHTML = ''; container.appendChild(renderer.domElement);
            const ambient = new THREE.AmbientLight(0xffffff, 0.8); scene.add(ambient);
            const light = new THREE.DirectionalLight(0xffffff, 0.5); light.position.set(5, 10, 5); scene.add(light);
            scientistGroup = new THREE.Group(); scene.add(scientistGroup);
            const head = new THREE.Mesh(new THREE.SphereGeometry(0.4, 32, 32), new THREE.MeshStandardMaterial({ color: 0xffdbac })); head.position.y = 1.2; scientistGroup.add(head);
            const body = new THREE.Mesh(new THREE.BoxGeometry(0.7, 1.2, 0.4), new THREE.MeshStandardMaterial({ color: 0x3b82f6 })); body.position.y = 0.3; scientistGroup.add(body);
            items3D.labcoat = new THREE.Mesh(new THREE.BoxGeometry(0.75, 1.15, 0.45), new THREE.MeshStandardMaterial({ color: 0xffffff })); items3D.labcoat.position.y = 0.35; items3D.labcoat.visible = false; scientistGroup.add(items3D.labcoat);
            items3D.goggles = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.15, 0.45), new THREE.MeshStandardMaterial({ color: 0x60a5fa, transparent: true, opacity: 0.6 })); items3D.goggles.position.set(0, 1.3, 0.1); items3D.goggles.visible = false; scientistGroup.add(items3D.goggles);
            items3D.tools = new THREE.Group(); items3D.tools.position.set(0.6, 0.3, 0.2); scientistGroup.add(items3D.tools);
            shopData.filter(i => i.layer === 'tool').forEach(item => {
                let mesh;
                if(item.id === 'item_microscope') mesh = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.05, 0.4), new THREE.MeshStandardMaterial({color: 0x333333}));
                else if(item.id === 'item_flask') mesh = new THREE.Mesh(new THREE.ConeGeometry(0.15, 0.3, 16), new THREE.MeshStandardMaterial({color: 0xec4899, transparent:true, opacity:0.8}));
                else if(item.id === 'item_telescope') mesh = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.06, 0.6), new THREE.MeshStandardMaterial({color: 0x4b5563}));
                else if(item.id === 'item_dna') mesh = new THREE.Mesh(new THREE.TorusKnotGeometry(0.1, 0.03, 64, 8), new THREE.MeshStandardMaterial({color: 0xef4444}));
                if(mesh) { mesh.name = item.id; mesh.visible = false; items3D.tools.add(mesh); }
            });
            let isDrag = false, prevX = 0;
            container.addEventListener('mousedown', () => isDrag = true); window.addEventListener('mouseup', () => isDrag = false);
            window.addEventListener('mousemove', (e) => { if(isDrag) scientistGroup.rotation.y += (e.clientX - prevX) * 0.01; prevX = e.clientX; });
            function anim() { requestAnimationFrame(anim); scientistGroup.position.y = Math.sin(Date.now()*0.002)*0.03; renderer.render(scene, camera); }
            anim();
        }

        // --- 全局核心函数 ---
        window.handleLogin = async () => {
            const nameEl = document.getElementById('studentNameInput');
            const name = nameEl ? nameEl.value.trim() : "";
            if (!name) return;

            state.studentName = name;
            const btn = document.getElementById('loginBtn'); 
            if(btn) { btn.innerText = "加载中..."; btn.disabled = true; }

            if (!isDemoMode) {
                try {
                    if (!state.user) {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await signInWithCustomToken(auth, __initial_auth_token);
                        } else {
                            await signInAnonymously(auth);
                        }
                    }
                    const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'studentProgress', name);
                    const snap = await getDoc(docRef);
                    if (snap.exists()) {
                        const d = snap.data();
                        state.power = d.power || 0; state.completedTasks = d.completedTasks || []; state.inventory = d.inventory || []; state.equipped = d.equipped || { labcoat: false, goggles: false, tool: null };
                    }
                } catch(e) {
                    console.warn("云端同步跳过:", e);
                    isDemoMode = true;
                }
            }

            document.getElementById('displayName').innerText = name;
            document.getElementById('loginModal').classList.add('hidden');
            document.getElementById('appContent').classList.remove('hidden');
            initThree(); renderMissions(); updateUI();
        };

        window.toggleTask = (tid) => {
            const t = allTasksFlat.find(x => x.id === tid);
            const idx = allTasksFlat.indexOf(t);
            const isAllDone = state.completedTasks.length === allTasksFlat.length;
            const locked = !isAllDone && idx > 0 && !state.completedTasks.includes(allTasksFlat[idx-1].id);
            if (locked) return;
            state.currentTaskId = tid;
            const hasSectionA = t.quiz.qA !== null;
            state.sectionApassed = !hasSectionA;
            document.getElementById('quizTitle').innerText = t.title;
            const secA = document.getElementById('sectionAContainer');
            if(hasSectionA) {
                secA.classList.remove('hidden');
                document.getElementById('quizQuestionA').innerText = t.quiz.qA;
                const opts = document.getElementById('quizOptionsA'); opts.innerHTML = '';
                t.quiz.aA.forEach((o, i) => {
                    const b = document.createElement('button');
                    b.className = "w-full text-left p-4 rounded-xl border-2 border-slate-100 hover:border-blue-400 font-bold transition-all bg-white";
                    b.innerText = o; b.onclick = () => window.checkA(i); opts.appendChild(b);
                });
                document.getElementById('sectionC').classList.add('hidden');
            } else {
                secA.classList.add('hidden');
                window.showSectionC();
            }
            document.getElementById('quizFeedback').classList.add('hidden');
            document.getElementById('quizModal').classList.remove('hidden');
        };

        window.checkA = (i) => {
            const t = allTasksFlat.find(x => x.id === state.currentTaskId);
            const f = document.getElementById('quizFeedback'); f.classList.remove('hidden', 'bg-green-100', 'text-green-700', 'bg-red-100', 'text-red-700');
            if (i === t.quiz.correctA) {
                f.innerText = "答案正确！请学习 Section C 要点。"; f.classList.add('bg-green-100', 'text-green-700');
                state.sectionApassed = true; window.showSectionC();
            } else { f.innerText = "选项错误，请再试一次！"; f.classList.add('bg-red-100', 'text-red-700'); }
        };

        window.showSectionC = () => {
            const t = allTasksFlat.find(x => x.id === state.currentTaskId);
            const secC = document.getElementById('sectionC');
            secC.classList.remove('hidden');
            document.getElementById('quizQuestionC').innerText = t.quiz.qC;
            document.getElementById('quizAnswerC').innerHTML = t.quiz.aC.map(pt => `<div class="point-item">${pt}</div>`).join('');
        };

        window.markCompleted = async () => {
            if (!state.sectionApassed) return;
            const t = allTasksFlat.find(x => x.id === state.currentTaskId);
            if (!state.completedTasks.includes(t.id)) {
                state.completedTasks.push(t.id);
                state.power += 10;
                if (state.completedTasks.length === allTasksFlat.length) {
                    shopData.forEach(item => { if (!state.inventory.includes(item.id)) state.inventory.push(item.id); });
                }
                renderMissions(); updateUI(); await sync();
            }
            window.closeQuiz();
        };

        window.closeQuiz = () => document.getElementById('quizModal').classList.add('hidden');
        window.toggleShop = () => { 
            const m = document.getElementById('shopModal'); 
            const notice = document.getElementById('shopRewardNotice');
            if (m.classList.contains('hidden')) { 
                if (state.completedTasks.length === allTasksFlat.length) notice.classList.remove('hidden');
                renderShop(); m.classList.remove('hidden'); 
            } else m.classList.add('hidden'); 
        };

        function renderShop() {
            const c = document.getElementById('shopItems'); if (!c) return; c.innerHTML = '';
            const isAllDone = state.completedTasks.length === allTasksFlat.length;
            shopData.forEach(item => {
                const owned = state.inventory.includes(item.id); const afford = state.power >= item.price;
                const d = document.createElement('div'); d.className = "bg-slate-50 p-6 rounded-[2.5rem] text-center border-2 border-transparent shadow-sm";
                let btnHtml = owned ? `<button disabled class="mt-4 w-full py-2.5 rounded-xl font-black text-sm bg-green-100 text-green-600 transition-all">已解锁</button>` :
                             isAllDone ? `<button onclick="buyItem('${item.id}')" class="mt-4 w-full py-2.5 rounded-xl font-black text-sm bg-blue-600 text-white transition-all">大师免费解开</button>` :
                             `<button onclick="buyItem('${item.id}')" ${!afford ? 'disabled' : ''} class="mt-4 w-full py-2.5 rounded-xl font-black text-sm transition-all ${afford ? 'bg-blue-600 text-white shadow-lg' : 'bg-slate-200 text-slate-400'}">${item.price} Power</button>`;
                d.innerHTML = `<div class="text-4xl mb-3">${item.icon}</div><h4 class="font-bold text-slate-800">${item.name}</h4>${btnHtml}`;
                c.appendChild(d);
            });
        }

        window.buyItem = async (id) => {
            const it = shopData.find(x => x.id === id);
            const isAllDone = state.completedTasks.length === allTasksFlat.length;
            if (it && !state.inventory.includes(id)) {
                if (!isAllDone && state.power >= it.price) { state.power -= it.price; state.inventory.push(id); }
                else if (isAllDone) state.inventory.push(id);
                renderShop(); updateUI(); await sync();
            }
        };

        window.toggleEquip = (id) => {
            const item = shopData.find(i => i.id === id);
            if (item.layer === 'tool') state.equipped.tool = (state.equipped.tool === id) ? null : id;
            else state.equipped[item.layer] = !state.equipped[item.layer];
            updateUI(); sync();
        };

        async function sync() {
            if (isDemoMode || !state.studentName) return;
            try {
                const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'studentProgress', state.studentName);
                const dataToSave = { power: state.power, completedTasks: state.completedTasks, inventory: state.inventory, equipped: state.equipped, lastUpdated: new Date().toISOString() };
                await setDoc(docRef, dataToSave, { merge: true });
            } catch(e) { console.warn("Cloud Sync Failed"); }
        }

        function updateUI() {
            const pc = document.getElementById('powerCounter'); if(pc) pc.innerText = state.power;
            const doneCount = state.completedTasks.length; const totalCount = allTasksFlat.length;
            const percentage = (doneCount / totalCount) * 100;
            const progBar = document.getElementById('progressBar'); const progText = document.getElementById('progressText');
            if(progBar) progBar.style.width = `${percentage}%`;
            if(progText) progText.innerText = `${doneCount}/${totalCount}`;
            if(doneCount === totalCount && progBar) progBar.classList.add('progress-glow');
            const rankBadge = document.getElementById('rankBadge');
            if(rankBadge) rankBadge.innerText = (doneCount === totalCount) ? "🏅 大师级科学家" : (doneCount > 10) ? "Senior Scientist" : (doneCount > 5) ? "Researcher" : "Junior Scientist";
            const inv = document.getElementById('inventoryContainer'); const eMsg = document.getElementById('emptyMsg');
            if (inv && eMsg) {
                inv.innerHTML = '';
                if (state.inventory.length === 0) eMsg.classList.remove('hidden');
                else {
                    eMsg.classList.add('hidden');
                    state.inventory.forEach(itemId => {
                        const item = shopData.find(i => i.id === itemId); if (!item) return;
                        const isEq = (state.equipped[item.layer] === itemId || state.equipped[item.layer] === true);
                        const btn = document.createElement('button'); btn.onclick = () => window.toggleEquip(itemId);
                        btn.className = `w-14 h-14 rounded-2xl flex items-center justify-center text-2xl transition-all border-4 shadow-sm relative ${isEq ? 'border-blue-500 bg-blue-50' : 'border-white bg-white hover:border-blue-200'}`;
                        btn.innerHTML = item.icon + (isEq ? '<div class="absolute -top-1 -right-1 w-4 h-4 bg-blue-600 rounded-full border-2 border-white shadow-sm"></div>' : '');
                        inv.appendChild(btn);
                    });
                }
            }
            if (items3D.labcoat) {
                items3D.labcoat.visible = state.equipped.labcoat;
                items3D.goggles.visible = state.equipped.goggles;
                items3D.tools.children.forEach(c => c.visible = (c.name === state.equipped.tool));
            }
        }

        function renderMissions() {
            const g = document.getElementById('missionGrid'); if (!g) return; g.innerHTML = '';
            const isAllDone = state.completedTasks.length === allTasksFlat.length;
            missionsData.forEach(ch => {
                const d = document.createElement('div');
                d.innerHTML = `<h3 class="text-xs font-black text-slate-400 uppercase tracking-widest mb-6 ml-1">${ch.title}</h3>
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                        ${ch.tasks.map(t => {
                            const idx = allTasksFlat.indexOf(t); 
                            const locked = !isAllDone && idx > 0 && !state.completedTasks.includes(allTasksFlat[idx-1].id); 
                            const done = state.completedTasks.includes(t.id);
                            return `<div onclick="toggleTask('${t.id}')" class="mission-card bg-white p-6 rounded-[2.5rem] border-2 border-transparent shadow-sm 
                                ${locked ? 'locked' : 'cursor-pointer hover:border-blue-400 hover:shadow-xl'} ${done ? 'completed' : ''}">
                                <div class="flex justify-between items-center"><p class="font-bold text-sm tracking-tight">${t.title}</p>
                                <span class="text-green-500 text-lg">${done ? '✅' : (locked ? '🔒' : '⭐')}</span></div></div>`;
                        }).join('')}</div>`;
                g.appendChild(d);
            });
        }

        // 初始化执行
        setupApp();

        window.handleLogin = handleLogin;
        window.toggleTask = toggleTask;
        window.checkA = checkA;
        window.markCompleted = markCompleted;
        window.closeQuiz = closeQuiz;
        window.toggleShop = toggleShop;
        window.buyItem = buyItem;
        window.toggleEquip = toggleEquip;
        window.showSectionC = showSectionC;
    </script>
</body>
</html>
